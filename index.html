        <style>
            @font-face {
                font-family: 'Montavon';
                src: url('./dist/montavon.ttf') format('truetype');
            }

            body {
                font-family: 'Montavon', Georgia, serif;
                margin: 0;
                padding: 1rem;
                background: oklch(0.95 0.01 30);
                color: #000;
            }

            body > * {
                margin: 1rem 0;
            }

            body > span {
                display: flex;
                gap: 0.5rem;
                font-size: 1.5rem;

                background-image: url("lines.png");
                background-size: contain;
            }

            body svg {
                width: 1em;
            }

            body svg path {
                fill: none;
                stroke: oklch(0.65 0.2 30);
                stroke-width: 0.08333em;
            }

            body > span > span {
                color: oklch(0.65 0.2 30);
                font-weight: normal;
                font-size: 1em;
                line-height: 1;
                margin: 0;
            }

            body > span > span.temoin {
                font-family: Georgia, serif;
            }

            body p {
                margin: 1rem 0;
            }

            body p:nth-child(1) {
                font-size: 1rem;
            }

            body p:nth-child(2) {
                font-size: 2rem;
            }

            body p:nth-child(3) {
                font-size: 3rem;
            }

            body p:nth-child(4) {
                font-size: 4rem;
            }
        </style>
